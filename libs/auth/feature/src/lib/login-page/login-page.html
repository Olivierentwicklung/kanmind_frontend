<div class="login-page">
  <header class="main_header w_full">
    <a routerLink="/" aria-label="KanMind home"><img src="/assets/icons/logo_icon.svg" alt="KanMind"></a>
  </header>
  <main class="w_full d_flex_cc_gl">
    <lib-login-form [loading]="store.status() === 'loading'" [error]="store.error()" (submitted)="login($event)" (guestRequested)="store.guestLogin()" />
  </main>
  <footer class="main_footer w_full">
    <nav class="d_flex_cs_gl" aria-label="Legal"><a routerLink="/privacy" class="link">Privacy Policy</a><a routerLink="/imprint" class="link">Imprint</a></nav>
  </footer>
</div>
