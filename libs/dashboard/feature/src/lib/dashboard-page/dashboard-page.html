<lib-app-shell
  [fullName]="authStore.session()?.fullName ?? null"
  (logoutRequested)="authStore.logout()"
>
<main class="w_full">
  @if (store.status() === 'loading' || store.status() === 'idle') {
    <section class="page-state" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <p>Loading dashboard…</p>
    </section>
  } @else if (store.status() === 'error') {
    <section class="page-state" role="alert">
      <h1 class="font_prime_color">Dashboard unavailable</h1>
      <p>We could not load your dashboard. Please check your connection and try again.</p>
      <button type="button" class="std_btn btn_prime" (click)="ngOnInit()">Try again</button>
    </section>
  } @else {
    <lib-dashboard-overview
      [view]="overview()"
      (boardSelected)="openBoard($event)"
      (boardsRequested)="openBoards()"
    />
    <lib-task-insights
      [tasks]="store.visibleTasks()"
      [mode]="store.taskMode()"
      [status]="store.taskInsightsStatus()"
      (modeChanged)="selectTaskMode($event)"
      (taskSelected)="openTask($event)"
    />
  }
</main>
</lib-app-shell>
