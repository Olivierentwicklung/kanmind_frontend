<div class="dialog-backdrop">
  <section
    class="task-dialog card"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'task-form-heading'"
  >
    <header>
      <h2 id="task-form-heading" class="font_prime_color">
        {{ mode() === 'create' ? 'Add Task' : 'Edit Task' }}
      </h2>
      <div>
        @if (mode() === 'edit') {
          <button type="button" class="icon-button" aria-label="Delete task" (click)="deleted.emit()">
            <img src="/assets/icons/delete.svg" alt="">
          </button>
        }
        <button type="button" class="icon-button" aria-label="Close task form" (click)="closed.emit()">
          <img src="/assets/icons/close_yellow.svg" alt="">
        </button>
      </div>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Status
        <select formControlName="status">
          <option value="to-do">To-do</option>
          <option value="in-progress">In-progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </label>

      <label>
        Title
        <input type="text" formControlName="title">
        @if ((submitted() || form.controls.title.touched) && form.controls.title.invalid) {
          <span class="field-error">Title must be at least 3 characters long.</span>
        }
      </label>

      <label>
        Description
        <textarea formControlName="description"></textarea>
      </label>

      <div class="form-grid">
        <label>
          Assignee
          <select formControlName="assigneeId">
            <option [ngValue]="null">Unassigned</option>
            @for (member of members(); track member.id) {
              <option [ngValue]="member.id">{{ member.fullName }}</option>
            }
          </select>
        </label>
        <label>
          Reviewer
          <select formControlName="reviewerId">
            <option [ngValue]="null">Unassigned</option>
            @for (member of members(); track member.id) {
              <option [ngValue]="member.id">{{ member.fullName }}</option>
            }
          </select>
        </label>
        <label>
          Due date
          <input type="date" formControlName="dueDate">
          @if ((submitted() || form.controls.dueDate.touched) && form.controls.dueDate.invalid) {
            <span class="field-error">Due date is required.</span>
          }
        </label>
        <label>
          Priority
          <select formControlName="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
      </div>

      @if (mutationStatus() === 'error') {
        <p role="alert" class="field-error">The task could not be saved. Please try again.</p>
      }

      <footer>
        <button type="button" class="std_btn btn_third" (click)="closed.emit()">Cancel</button>
        <button
          type="submit"
          class="std_btn btn_prime"
          [disabled]="mutationStatus() === 'loading'"
        >
          {{ mode() === 'create' ? 'Add task' : 'Save task' }}
        </button>
      </footer>
    </form>
  </section>
</div>
